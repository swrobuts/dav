/* ── Copy Button ── */
function CopyBtn({ text }) {
    const [ok, setOk] = useState(false);
    return (
        <button className="copy-btn" onClick={() => {
            navigator.clipboard.writeText(text).then(() => { setOk(true); setTimeout(() => setOk(false), 2000); });
        }}>{ok ? '✓ Kopiert' : 'Kopieren'}</button>
    );
}
