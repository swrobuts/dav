<!DOCTYPE html>
<html lang="de">
<head>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        * { scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            overflow-x: hidden;
        }
        .hero-gradient {
            background: #0389CF;
            position: relative;
            overflow: hidden;
        }
        .animated-bg {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0.12;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(232, 121, 47, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.15) 0%, transparent 50%);
            animation: float 15s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }
        .fade-in { animation: fadeIn 0.8s ease-in; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .slide-in-left { animation: slideInLeft 0.8s ease-out; }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .slide-in-right { animation: slideInRight 0.8s ease-out; }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .pulse-float { animation: pulseFloat 3s ease-in-out infinite; }
        @keyframes pulseFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .stat-number {
            font-size: 3rem; font-weight: 900;
            color: #E8792F; font-variant-numeric: tabular-nums;
        }
        .lab-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
        }
        .lab-card:hover {
            transform: translateY(-8px);
            border-color: #E8792F;
            box-shadow: 0 20px 40px rgba(232, 121, 47, 0.15);
        }
        .code-block {
            background: #1e293b;
            border-left: 4px solid #E8792F;
            color: #e2e8f0;
            font-family: 'Monaco', 'Courier New', monospace;
            padding: 1.5rem; border-radius: 0.5rem; overflow-x: auto;
        }
        .copy-button { background: #E8792F; transition: background 0.2s; }
        .copy-button:hover { background: #d4652b; }
        .icon-wrapper {
            width: 4rem; height: 4rem;
            background: rgba(232, 121, 47, 0.9);
            border-radius: 0.75rem;
            display: flex; align-items: center; justify-content: center; color: white;
        }
        .scroll-reveal {
            opacity: 0; transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .scroll-reveal.visible { opacity: 1; transform: translateY(0); }
        .navbar {
            background: white;
            box-shadow: 0 1px 12px rgba(0, 0, 0, 0.05);
            position: sticky; top: 0; z-index: 50;
        }
        .logo {
            font-size: 1.5rem; font-weight: 800;
            background: linear-gradient(135deg, #0389CF 0%, #0566A0 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .lang-btn {
            padding: 0.5rem 0.75rem; border-radius: 0.375rem;
            border: 2px solid #e5e7eb; background: white;
            cursor: pointer; font-weight: 600; font-size: 0.875rem;
            color: #666; transition: all 0.2s;
        }
        .lang-btn.active { background: #E8792F; color: white; border-color: #E8792F; }
        .lang-btn:hover { border-color: #E8792F; }
        .stat-bar { background: white; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .stat-item { text-align: center; padding: 2rem 1.5rem; position: relative; }
        .stat-item + .stat-item::before {
            content: ''; position: absolute; left: 0; top: 25%; height: 50%;
            width: 1px; background: rgba(3,137,207,0.1);
        }
        .data-flow { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
        .data-flow-item {
            background: white; border: 1px solid rgba(3,137,207,0.3);
            border-radius: 0.5rem; padding: 1rem 1.5rem;
            font-weight: 600; color: #0389CF;
            flex: 1; min-width: 120px; text-align: center;
        }
        .data-flow-arrow {
            font-size: 1.5rem; color: #E8792F; font-weight: bold;
            animation: arrowPulse 2s ease-in-out infinite;
        }
        @keyframes arrowPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; transform: translateX(5px); }
        }
        @media (max-width: 768px) {
            .stat-number { font-size: 2.5rem; }
            .data-flow { flex-direction: column; }
            .data-flow-arrow { transform: rotate(90deg); }
        }
    </style>
</head>

    function CopyButton({ text, label }) {
        const [copied, setCopied] = useState(false);
        const handleCopy = () => {
            navigator.clipboard.writeText(text).then(() => {
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            });
        };
        return (
            <button onClick={handleCopy} className="copy-button text-white text-sm font-semibold px-4 py-2 rounded-lg">
                {copied ? '✓ Kopiert' : label || 'Kopieren'}
            </button>
        );
    }

    function App() {

        const t = translations[lang];
        const revealRefs = useRef([]);

        useEffect(() => {
            document.documentElement.lang = lang;
        }, [lang]);

        useEffect(() => {
            const observer = new IntersectionObserver(
                (entries) => entries.forEach(e => e.isIntersecting && e.target.classList.add('visible')),
                { threshold: 0.1 }
            );
            revealRefs.current.forEach(el => el && observer.observe(el));
            return () => observer.disconnect();
        }, []);

        const addReveal = (el) => { if (el && !revealRefs.current.includes(el)) revealRefs.current.push(el); };

        return (

                        </div>
                        <div className="hidden md:flex items-center gap-6">

                        </div>
                        <div className="flex gap-2">
                            <button className={`lang-btn ${lang === 'de' ? 'active' : ''}`} onClick={() => setLang('de')}>DE</button>
                            <button className={`lang-btn ${lang === 'en' ? 'active' : ''}`} onClick={() => setLang('en')}>EN</button>
                        </div>
                    </div>
                </nav>

                    <div className="animated-bg"></div>
                    <div className="relative z-10 max-w-5xl mx-auto text-center fade-in">
                        <div className="inline-flex items-center gap-2 bg-white bg-opacity-15 rounded-full px-4 py-2 text-sm font-medium mb-6 backdrop-blur-sm">
                            <span>🎓</span>
                            <span>THWS BBA – Sommersemester 2026</span>
                        </div>
                        <h1 className="text-4xl md:text-6xl font-black mb-4 leading-tight">{t.hero.headline}</h1>
                        <p className="text-xl md:text-2xl font-medium mb-2 opacity-90">{t.hero.tagline}</p>
                        <p className="text-lg opacity-75 mb-10">{t.hero.sub}</p>
                        <div className="flex flex-col sm:flex-row gap-4 justify-center">
                            <a href="#labs" className="inline-flex items-center gap-2 font-bold px-8 py-4 rounded-xl text-lg transition-all hover:-translate-y-1" style={{background:'#E8792F', color:'white'}}>
                                {t.hero.cta} →
                            </a>
                            <a href="docker-guide.html" className="inline-flex items-center gap-2 font-bold px-8 py-4 rounded-xl text-lg bg-white bg-opacity-15 hover:bg-opacity-25 transition-all hover:-translate-y-1 backdrop-blur-sm">
                                🐳 {t.hero.cta2}
                            </a>
                        </div>
                    </div>

                    {/* Geometric decoration */}
                    <div className="absolute right-10 top-10 opacity-10 hidden lg:block">
                        <svg width="200" height="200" viewBox="0 0 200 200">
                            <rect x="20" y="20" width="60" height="60" fill="white" rx="4"/>
                            <rect x="90" y="20" width="60" height="60" fill="white" rx="4" opacity="0.6"/>
                            <rect x="20" y="90" width="60" height="60" fill="white" rx="4" opacity="0.6"/>
                            <rect x="90" y="90" width="60" height="60" fill="white" rx="4" opacity="0.3"/>

                            { val: '🐍', label: t.stats.tools }
                        ].map((s, i) => (
                            <div key={i} className="stat-item">

                                        </div>

                        <div className="text-center">

                                {t.docker_cta} →

                    </div>
                </section>

                {/* About */}
                <section id="about" className="py-20 px-6 bg-gray-50">
                    <div className="max-w-5xl mx-auto" ref={addReveal}>
                        <h2 className="text-3xl font-black mb-6" style={{color:'#0389CF'}}>{t.about_title}</h2>
                        <div className="grid md:grid-cols-2 gap-8">
                            <div>
                                <p className="text-gray-600 leading-relaxed mb-6">{t.about_desc}</p>
                                <div className="rounded-xl p-5 mb-4" style={{background:'rgba(3,137,207,0.08)', borderLeft:'4px solid #0389CF'}}>
                                    <h3 className="font-bold mb-2" style={{color:'#0389CF'}}>{t.about_p1_title}</h3>
                                    <p className="text-gray-600 text-sm leading-relaxed">{t.about_p1}</p>
                                </div>
                            </div>
                            <div>
                                <h3 className="font-bold mb-4" style={{color:'#0389CF'}}>{t.about_p2_title}</h3>
                                <ul className="space-y-3">
                                    {t.about_p2_items.map((item, i) => (
                                        <li key={i} className="flex items-start gap-3">
                                            <span className="mt-1 text-green-500 font-bold flex-shrink-0">✓</span>
                                            <span className="text-gray-600 text-sm">{item}</span>

                            </div>

                    </div>
                </section>

                {/* Footer */}
                <footer className="py-10 px-6 text-center text-sm text-gray-500" style={{background:'#1e293b', color:'#94a3b8'}}>
                    <p className="font-semibold text-white mb-1">{t.footer_built}</p>
                    <p>{t.footer_prof}</p>
                    <p>{t.footer_thws}</p>
                    <div className="mt-4">
                        <a href="https://github.com/swrobuts/dav-lab" className="text-blue-400 hover:text-blue-300">{t.footer_github}</a>
                    </div>

            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
