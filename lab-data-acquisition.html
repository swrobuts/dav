const CODE_NOSQL = `# ── MongoDB – Dokumentenorientierte Datenbank ──────────────────
from pymongo import MongoClient
import pandas as pd

client = MongoClient('mongodb://localhost:27017/')
db = client['webshop']
orders = db['bestellungen']

# Dokument einfügen
orders.insert_one({
    "kunden_id": 42,
    "artikel": [{"name": "Laptop", "preis": 1299.99}],
    "status": "versandt"
})

# Abfrage: Artikel mit Preis > 1000
cursor = orders.find({"artikel.preis": {"$gt": 1000}})
df = pd.DataFrame(list(cursor)).drop(columns=['_id'], errors='ignore')
print(df.head())

# Aggregation: Umsatz pro Status
pipeline = [
    {"$unwind": "$artikel"},
    {"$group": {"_id": "$status", "umsatz": {"$sum": "$artikel.preis"}}},
    {"$sort": {"umsatz": -1}}
]
print(list(orders.aggregate(pipeline)))

# ── Redis – Key-Value-Store (Caching, Sessions) ────────────────
import redis
r = redis.Redis(host='localhost', port=6379, decode_responses=True)

r.set('letzter_sync', '2026-03-06')
r.expire('letzter_sync', 3600)          # Ablauf nach 1 Stunde
print(r.get('letzter_sync'))            # 2026-03-06

# Hash speichern (strukturierte Daten)
r.hset('user:42', mapping={"name": "Anna", "email": "anna@example.com"})
print(r.hgetall('user:42'))`;

// ── CodeBlock with copy button ───────────────────────────────────────────────

function CodeBlock({ code, lang }) {
    const [copied, setCopied] = useState(false);
    const handleCopy = () => {
        navigator.clipboard.writeText(code).then(() => {
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
        }).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = code; ta.style.position = 'fixed'; ta.style.opacity = '0';
            document.body.appendChild(ta); ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
        });
    };
    const copyLabel = lang === 'en' ? 'Copy' : 'Kopieren';
    const copiedLabel = lang === 'en' ? '✓ Copied' : '✓ Kopiert';
    return (
        <div className="code-wrapper">
            <button className={`copy-btn${copied ? ' copied' : ''}`} onClick={handleCopy} title={copyLabel}>
                {copied ? copiedLabel : `⎘ ${copyLabel}`}
            </button>
            <div className="code-block">{code}</div>
        </div>
    );
}

// ── Quiz ─────────────────────────────────────────────────────────────────────

function QuizSection({ questions, title, intro, lang }) {
    const [answers, setAnswers] = useState({});
    const [checked, setChecked] = useState({});
    const [score, setScore] = useState(null);
    const check = (qi, oi) => { if (checked[qi]) return; setAnswers(a => ({...a,[qi]:oi})); setChecked(c => ({...c,[qi]:true})); };
    const calcScore = () => { let s=0; questions.forEach((q,i) => { if(answers[i]===q.ans) s++; }); setScore(s); };
    const btnLabel = lang === 'en' ? 'Results' : 'Auswertung';
    const goodLabel = lang === 'en' ? 'Excellent!' : 'Sehr gut!';
    const retryLabel = lang === 'en' ? 'Review the material!' : 'Nochmal lesen!';
    return (
        <div>
            <h2>{title}</h2><p>{intro}</p>
            {questions.map((q,qi) => (
                <div key={qi} className="mb-6 p-4 bg-white rounded-xl border border-gray-200">
                    <p className="font-semibold text-gray-800 mb-3">{qi+1}. {q.q}</p>
                    {q.opts.map((opt,oi) => (
                        <button key={oi} className={`quiz-option ${checked[qi]?(oi===q.ans?'correct':(answers[qi]===oi?'wrong':'')):''}` } onClick={() => check(qi,oi)}>{opt}</button>
                    ))}
                </div>
            ))}
            <button onClick={calcScore} className="mt-4 px-6 py-3 rounded-xl text-white font-bold" style={{background:'#0389CF'}}>{btnLabel}</button>
            {score !== null && (
                <div className="mt-4 p-4 rounded-xl text-center" style={{background:score>=questions.length*0.8?'#f0fdf4':'#fef2f2'}}>
                    <p className="text-2xl font-black">{score}/{questions.length}</p>
                    <p className="font-semibold">{score >= questions.length*0.8 ? goodLabel : retryLabel}</p>
                </div>
            )}
        </div>
    );
}
