const CODE_MAP = `// ISO-Codes für Plotly (Land → 3-stelliger Alpha-3-Code)
const ISO_CODES = {
    "Finland": "FIN", "Germany": "DEU", "France": "FRA",
    "United States": "USA", "Brazil": "BRA",
    // ... weitere Länder (100+ Einträge im vollständigen Dashboard)
};

// Farbskala: Rot (unglücklich) → Weiß → Blau (glücklich)
const COLOR_SCALE = [
    [0, "#67001f"], [0.17, "#b2182b"], [0.33, "#d6604d"],
    [0.5, "#f7f7f7"], [0.67, "#92c5de"], [0.83, "#2166ac"], [1, "#053061"]

    hovertemplate: "%{text}<extra></extra>",
    colorscale: COLOR_SCALE,
    zmin: 2, zmax: 8,
    marker: { line: { color: "#ffffff", width: 0.5 } }

    geo: {

        showcoastlines: true,

const years = [...new Set(allData.map(d => d.Year))].sort();

    const pts = years.map(y => {
        const row = allData.find(d => d.Country === country && d.Year === y);
        return row ? row["Happiness Score"] : null;
    });
    return {
        type: "scatter", mode: "lines+markers",
        name: country,
        x: years, y: pts,
        line:   { color: COLOR_COUNTRIES[i], width: 2.5 },
        marker: { size: 5 },
        connectgaps: true
    };
});
Plotly.newPlot("trend-chart", traces, { ...layout });`;

    .filter(d => d["Happiness Score"])
    .sort((a,b) => b["Happiness Score"] - a["Happiness Score"]);

const top5  = sorted.slice(0, 5);
const flop5 = sorted.slice(-5).reverse();
const combined = [...flop5, ...top5];

Plotly.newPlot("top-flop", [{
    type: "bar", orientation: "h",
    y: combined.map(d => d.Country),
    x: combined.map(d => d["Happiness Score"]),
    marker: { color: combined.map(d => scoreToColor(d["Happiness Score"])) },

}], { ...layout });`;

const CODE_REGIONAL = `// Regionale Analyse: Mittelwert + Fehlerbalken (Min/Max)
const regionMap = {};
yearData.forEach(d => {
    if (!regionMap[d.Region]) regionMap[d.Region] = [];
    regionMap[d.Region].push(d["Happiness Score"]);
});

const entries = Object.entries(regionMap).map(([region, scores]) => ({
    region,
    mean: scores.reduce((a,b)=>a+b,0) / scores.length,
    min:  Math.min(...scores),
    max:  Math.max(...scores)
})).sort((a,b) => a.mean - b.mean);

Plotly.newPlot("region-chart", [{
    type: "bar", orientation: "h",
    y: entries.map(e => e.region),
    x: entries.map(e => e.mean),
    error_x: {
        type: "data", symmetric: false,
        array:      entries.map(e => e.max - e.mean),
        arrayminus: entries.map(e => e.mean - e.min)
    }
}], { ...layout });`;

const CODE_SCATTER = `// Scatter: BIP vs. Happiness Score + lineare Regression
function linearRegression(xs, ys) {
    const mx = xs.reduce((a,b)=>a+b,0)/xs.length;
    const my = ys.reduce((a,b)=>a+b,0)/ys.length;
    let num=0, den=0;
    xs.forEach((x,i) => { num+=(x-mx)*(ys[i]-my); den+=(x-mx)**2; });
    const m = den ? num/den : 0, b = my - m*mx;
    const r2 = 1 - ys.reduce((s,y,i)=>s+(y-(m*xs[i]+b))**2,0)
                    / ys.reduce((s,y)=>s+(y-my)**2,0);
    return { m, b, r2, r: Math.sign(m)*Math.sqrt(r2) };
}

const xs = yearData.map(d => d.GDP).filter(Boolean);
const ys = yearData.map(d => d["Happiness Score"]).filter(Boolean);
const { m, b, r, r2 } = linearRegression(xs, ys);

// Punkte + Trendlinie
Plotly.newPlot("scatter", [
    { type:"scatter", mode:"markers", x:xs, y:ys, marker:{color:"#ccc"} },
    { type:"scatter", mode:"lines",
      x:[Math.min(...xs), Math.max(...xs)],
      y:[m*Math.min(...xs)+b, m*Math.max(...xs)+b],
      line:{dash:"dash", color:"#0389CF"} }
], { ...layout });

// r und R² im Subtitle anzeigen
subtitle.textContent = \`r = \${r.toFixed(2)} · R² = \${r2.toFixed(2)}\`;`;

<select id="countrySelect" multiple></select>

// JavaScript: State
let selectedYear    = 2024;
let selectedRegion  = "";
let selectedCountries = [];

// Alle Charts neu rendern wenn Filter sich ändert
function updateAllCharts() {
    const filteredData = allData
        .filter(d => d.Year === selectedYear)
        .filter(d => !selectedRegion || d.Region === selectedRegion);

    drawMap(filteredData);
    drawTrend();           // nutzt allData für alle Jahre
    drawTopFlop(filteredData);
    drawRegional(filteredData);
    drawScatter(filteredData);
    drawHeatmap(filteredData);
    updateKPIs(filteredData);
}

// Event Listener
document.getElementById("yearSelect").addEventListener("change", e => {
    selectedYear = +e.target.value;
    updateAllCharts();
});

document.getElementById("regionSelect").addEventListener("change", e => {
    selectedRegion = e.target.value;
    updateAllCharts();
});

document.getElementById("countrySelect").addEventListener("change", e => {
    // Max 5 Länder
    const sel = Array.from(e.target.selectedOptions).map(o => o.value);
    selectedCountries = sel.slice(0, 5);
    updateAllCharts();
});`;

// ── CodeBlock ─────────────────────────────────────────────────────────────────

function CodeBlock({ code }) {
    const [copied, setCopied] = useState(false);
    const handleCopy = () => {
        navigator.clipboard.writeText(code).then(() => {
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
        }).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = code; ta.style.position = 'fixed'; ta.style.opacity = '0';
            document.body.appendChild(ta); ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
        });
    };
    return (
        <div className="code-wrapper">
            <button className={`copy-btn${copied ? ' copied' : ''}`} onClick={handleCopy} title="Code kopieren">
                {copied ? '✓ Kopiert' : '⎘ Kopieren'}
            </button>
            <div className="code-block">{code}</div>
        </div>
    );
}

// ── QuizSection ───────────────────────────────────────────────────────────────

function QuizSection({ questions, title, intro }) {
    const [answers, setAnswers] = useState({});
    const [checked, setChecked] = useState({});
    const [score, setScore]     = useState(null);
    const check = (qi, oi) => {
        if (checked[qi]) return;
        setAnswers(a => ({...a, [qi]: oi}));
        setChecked(c => ({...c, [qi]: true}));
    };
    const calcScore = () => {
        let s = 0;
        questions.forEach((q,i) => { if (answers[i] === q.ans) s++; });
        setScore(s);
    };
    return (
        <div>
            <h2>{title}</h2><p>{intro}</p>
            {questions.map((q, qi) => (
                <div key={qi} className="mb-6 p-4 bg-white rounded-xl border border-gray-200">
                    <p className="font-semibold text-gray-800 mb-3">{qi+1}. {q.q}</p>
                    {q.opts.map((opt, oi) => (
                        <button key={oi}
                            className={`quiz-option ${checked[qi] ? (oi===q.ans ? 'correct' : (answers[qi]===oi ? 'wrong' : '')) : ''}`}
                            onClick={() => check(qi, oi)}>
                            {opt}
                        </button>
                    ))}
                </div>
            ))}
            <button onClick={calcScore} className="mt-4 px-6 py-3 rounded-xl text-white font-bold" style={{background:'#0389CF'}}>
                Auswertung / Results
            </button>
            {score !== null && (
                <div className="mt-4 p-4 rounded-xl text-center" style={{background: score >= questions.length*0.8 ? '#f0fdf4' : '#fef2f2'}}>
                    <p className="text-2xl font-black">{score}/{questions.length}</p>
                    <p className="font-semibold">{score >= questions.length*0.8 ? 'Sehr gut!' : 'Nochmal lesen!'}</p>
                </div>
            )}
        </div>
    );
}

                        padding:'0.15rem 0.55rem', borderRadius:999
                    }}>Advanced</span>
                </div>
                <div className="flex gap-2">
                    <button className={`lang-btn ${lang==='de'?'active':''}`} onClick={() => setLang('de')}>DE</button>
                    <button className={`lang-btn ${lang==='en'?'active':''}`} onClick={() => setLang('en')}>EN</button>
                </div>
            </div>

            {/* Sidebar */}
            <nav className="sidebar">
                {sectionIds.map((id, i) => (
                    <div
                        key={id}
                        className={`sidebar-item ${active===id ? 'active' : ''}`}
                        onClick={() => scrollTo(id)}
                    >
                        {tr.sections[i]}
                    </div>
                ))}
            </nav>

            {/* Main content */}
            <main className="main-content">
                {sections.map(s => (
                    <div key={s.id} id={s.id} className="mb-12">
                        {s.content()}
                    </div>
                ))}
            </main>

            {/* Footer */}
            <footer style={{background:'#0f172a', padding:'2.5rem 1.5rem', textAlign:'center', marginLeft:260}}>
                <p style={{fontWeight:700, color:'#e2e8f0', marginBottom:'0.3rem', fontSize:'0.9rem'}}>
                    Gebaut für BBA Studierende · THWS Würzburg-Schweinfurt
                </p>
                <p style={{color:'#64748b', fontSize:'0.82rem', marginBottom:'0.25rem'}}>Prof. Dr. Robert Butscher</p>
                <div style={{marginTop:'1rem'}}>
                    <a href="index.html" style={{color:'#60a5fa', fontSize:'0.82rem', textDecoration:'none'}}>← DAV Lab</a>
                </div>
            </footer>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
