<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAV Lernumgebung starten – Docker Guide</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --color-primary: #0389CF;
            --color-orange: #E8792F;
            --color-light-blue: #EBF5FF;
            --color-light-yellow: #FFFBEB;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; }
        .text-primary { color: var(--color-primary); }
        .bg-primary { background-color: var(--color-primary); }
        .text-orange { color: var(--color-orange); }
        .hero-section { background-color: var(--color-primary); }
        .code-block {
            background-color: #1e293b;
            border-left: 4px solid var(--color-orange);
            padding: 1rem; border-radius: 0.5rem; position: relative;
        }
        .code-text {
            color: #e2e8f0; font-family: 'Courier New', monospace;
            font-size: 0.875rem; margin: 0; white-space: pre-wrap; word-break: break-all;
        }
        .copy-button {
            position: absolute; top: 0.5rem; right: 0.5rem;
            background-color: var(--color-orange); color: white;
            padding: 0.25rem 0.75rem; border: none; border-radius: 0.25rem;
            cursor: pointer; font-size: 0.75rem; transition: opacity 0.2s;
        }
        .copy-button:hover { opacity: 0.8; }
        .step-number {
            background-color: var(--color-orange); color: white;
            width: 2rem; height: 2rem; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; flex-shrink: 0;
        }
        .section-header {
            color: var(--color-primary); font-size: 1.875rem; font-weight: bold;
            border-left: 4px solid var(--color-orange);
            padding-left: 1rem; margin: 2rem 0 1.5rem 0;
        }
        .nav-sidebar {
            position: fixed; left: 0; top: 4rem;
            width: 240px; height: calc(100vh - 4rem);
            background-color: #f8f9fa; border-right: 1px solid #e0e0e0;
            overflow-y: auto; z-index: 40;
        }
        .nav-item {
            padding: 0.75rem 1.5rem; cursor: pointer;
            border-left: 3px solid transparent;
            color: var(--color-primary); transition: all 0.2s;
        }
        .nav-item:hover { background-color: #e8f4f8; border-left-color: var(--color-orange); }
        .nav-item.active { background-color: var(--color-light-blue); border-left-color: var(--color-orange); font-weight: 600; }
        .main-content { margin-left: 240px; padding: 2rem; }
        .sticky-navbar {
            position: sticky; top: 0; height: 4rem; background-color: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 2rem; z-index: 50;
        }
        .lang-btn {
            padding: 0.5rem 1rem; border: 1px solid #d0d0d0; background-color: white;
            border-radius: 0.375rem; cursor: pointer; font-size: 0.875rem;
            transition: all 0.2s; color: var(--color-primary);
        }
        .lang-btn.active { background-color: var(--color-orange); color: white; border-color: var(--color-orange); }
        .lang-btn:hover { border-color: var(--color-orange); }
        .info-box { background-color: var(--color-light-blue); border-left: 4px solid #3b82f6; padding: 1rem; border-radius: 0.5rem; margin: 1.5rem 0; }
        .warning-box { background-color: var(--color-light-yellow); border-left: 4px solid #fbbf24; padding: 1rem; border-radius: 0.5rem; margin: 1.5rem 0; }
        .success-box { background-color: #f0fdf4; border-left: 4px solid #22c55e; padding: 1rem; border-radius: 0.5rem; margin: 1.5rem 0; }
        table { width: 100%; border-collapse: collapse; background-color: white; }
        th { background-color: var(--color-primary); color: white; padding: 1rem; text-align: left; }
        td { padding: 0.875rem 1rem; border-bottom: 1px solid #e0e0e0; }
        tr:hover td { background-color: #f8fafc; }
        @media (max-width: 768px) { .nav-sidebar { display: none; } .main-content { margin-left: 0; } }
    </style>
</head>
<body>
<div id="root"></div>

                { dir: 'notebooks/', desc: '13 Jupyter Notebooks (00_Welcome through 12_Quiz)' },

            ],
            jupyter_first: 'Start with notebooks/00_Willkommen.ipynb!',

            stop_cmd: 'docker compose down',

    function CopyBtn({ text }) {
        const [copied, setCopied] = useState(false);
        return (
            <button className="copy-button" onClick={() => {
                navigator.clipboard.writeText(text);
                setCopied(true); setTimeout(() => setCopied(false), 2000);
            }}>{copied ? '✓' : 'Kopieren'}</button>
        );
    }

    const sections = ['overview','prereq','install','repo','start','jupyter','stop','trouble','cmds'];

    function App() {
        const [lang, setLang] = useState('de');
        const [active, setActive] = useState('overview');
        const tr = t[lang];

        const scrollTo = (id) => {
            setActive(id);
            document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
        };

        useEffect(() => {
            const handler = () => {
                for (const s of sections) {
                    const el = document.getElementById(s);
                    if (el) {
                        const rect = el.getBoundingClientRect();
                        if (rect.top <= 120 && rect.bottom >= 120) { setActive(s); break; }
                    }
                }
            };
            window.addEventListener('scroll', handler);
            return () => window.removeEventListener('scroll', handler);
        }, []);

        return (
            <div>
                {/* Top Navbar */}
                <div className="sticky-navbar">
                    <div className="flex items-center gap-4">
                        <a href="index.html" className="text-sm font-semibold" style={{color:'#0389CF'}}>{tr.brand}</a>
                        <span className="text-gray-300">|</span>
                        <span className="font-bold" style={{color:'#0389CF'}}>{tr.title}</span>
                    </div>
                    <div className="flex gap-2">
                        <button className={`lang-btn ${lang==='de'?'active':''}`} onClick={() => setLang('de')}>DE</button>
                        <button className={`lang-btn ${lang==='en'?'active':''}`} onClick={() => setLang('en')}>EN</button>
                    </div>
                </div>

                {/* Sidebar */}
                <nav className="nav-sidebar">
                    <div className="py-4">
                        {sections.map((s, i) => (
                            <div key={s} className={`nav-item ${active===s?'active':''}`} onClick={() => scrollTo(s)}>
                                {tr.nav[i]}
                            </div>
                        ))}
                    </div>
                </nav>

                {/* Main Content */}
                <main className="main-content max-w-4xl">

                    {/* Hero */}
                    <div className="hero-section text-white rounded-2xl p-8 mb-8 flex items-center gap-6">
                        <div className="text-6xl">🐳</div>
                        <div>
                            <h1 className="text-3xl font-black mb-2">{tr.title}</h1>
                            <p className="text-lg opacity-80">JupyterLab + Python + PostgreSQL in Docker</p>
                        </div>
                    </div>

                    {/* Overview */}
                    <section id="overview">
                        <h2 className="section-header">{tr.overview_title}</h2>
                        <p className="text-gray-600 mb-4">{tr.overview_desc}</p>
                        <div className="grid md:grid-cols-2 gap-4 mb-4">
                            {tr.containers.map((c, i) => (
                                <div key={i} className="border rounded-xl p-4" style={{borderColor:'rgba(3,137,207,0.2)'}}>
                                    <div className="flex items-center gap-2 mb-2">
                                        <span className="font-mono font-bold" style={{color:'#0389CF'}}>{c.name}</span>
                                        <span className="text-xs px-2 py-0.5 rounded-full text-white" style={{background:'#E8792F'}}>{c.badge}</span>
                                    </div>
                                    <p className="text-gray-600 text-sm">{c.desc}</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Prerequisites */}
                    <section id="prereq">
                        <h2 className="section-header">{tr.prereq_title}</h2>
                        <p className="text-gray-600 mb-4">{tr.prereq_desc}</p>
                        <div className="grid md:grid-cols-2 gap-4">
                            {tr.prereq_items.map((p, i) => (
                                <div key={i} className="bg-gray-50 rounded-xl p-5 border border-gray-200">
                                    <h3 className="font-bold mb-2" style={{color:'#0389CF'}}>{p.title}</h3>
                                    <p className="text-gray-600 text-sm mb-3">{p.desc}</p>
                                    <a href={p.link} target="_blank" rel="noopener noreferrer"
                                       className="inline-block text-sm font-semibold px-4 py-2 rounded-lg text-white"
                                       style={{background:'#E8792F'}}>{p.linkText} →</a>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Installation */}
                    <section id="install">
                        <h2 className="section-header">{tr.install_title}</h2>
                        {tr.install_steps.map((s, i) => (
                            <div key={i} className="flex gap-4 mb-4">
                                <div className="step-number">{i + 1}</div>
                                <div className="flex-1 pt-1">
                                    <p className="font-semibold text-gray-800 mb-1">{s.title}</p>
                                    <p className="text-gray-600 text-sm">{s.desc}</p>
                                    {i === 3 && (
                                        <div className="code-block mt-2">
                                            <pre className="code-text">{tr.install_verify}</pre>
                                            <CopyBtn text={tr.install_verify} />
                                        </div>
                                    )}
                                </div>
                            </div>
                        ))}
                        <div className="info-box">
                            <p className="text-sm text-blue-800">{tr.install_verify_note}</p>
                        </div>
                    </section>

                    {/* Repository */}
                    <section id="repo">
                        <h2 className="section-header">{tr.repo_title}</h2>
                        <p className="font-semibold text-gray-700 mb-2">{tr.repo_option1}</p>
                        <div className="code-block mb-4">
                            <pre className="code-text">{tr.repo_clone}</pre>
                            <CopyBtn text={tr.repo_clone} />
                        </div>
                        <div className="warning-box">
                            <p className="font-semibold text-yellow-800 text-sm">{tr.repo_option2}</p>
                            <p className="text-yellow-700 text-sm mt-1">{tr.repo_zip}</p>
                        </div>
                    </section>

                    {/* Start */}
                    <section id="start">
                        <h2 className="section-header">{tr.start_title}</h2>
                        <p className="text-gray-600 mb-3">{tr.start_desc}</p>
                        <div className="code-block mb-4">
                            <pre className="code-text">{tr.start_cmd}</pre>
                            <CopyBtn text={tr.start_cmd} />
                        </div>
                        <ul className="space-y-2 mb-4">
                            {tr.start_steps.map((s, i) => (
                                <li key={i} className="flex items-start gap-2 text-gray-600 text-sm">
                                    <span className="text-green-500 mt-0.5">✓</span>{s}
                                </li>
                            ))}
                        </ul>
                        <p className="text-gray-600 text-sm mb-2 font-semibold">Status prüfen:</p>
                        <div className="code-block mb-4">
                            <pre className="code-text">{tr.start_status}</pre>
                            <CopyBtn text={tr.start_status} />
                        </div>
                        <p className="text-gray-600 text-sm mb-2 font-semibold">Logs ansehen:</p>
                        <div className="code-block">
                            <pre className="code-text">{tr.start_logs}</pre>
                            <CopyBtn text={tr.start_logs} />
                        </div>
                    </section>

                    {/* JupyterLab */}
                    <section id="jupyter">
                        <h2 className="section-header">{tr.jupyter_title}</h2>
                        <p className="text-gray-600 mb-3">{tr.jupyter_desc}</p>
                        <div className="code-block mb-4">
                            <pre className="code-text">{tr.jupyter_url}</pre>
                            <CopyBtn text={tr.jupyter_url} />
                        </div>
                        <div className="success-box">
                            <p className="text-green-800 font-semibold text-sm">{tr.jupyter_note}</p>
                        </div>
                        <p className="text-gray-600 mb-3">{tr.jupyter_structure}</p>
                        <div className="bg-gray-50 rounded-xl p-4 font-mono text-sm">
                            {tr.jupyter_dirs.map((d, i) => (
                                <div key={i} className="flex gap-4 py-1">
                                    <span className="font-semibold" style={{color:'#0389CF', minWidth:'120px'}}>{d.dir}</span>
                                    <span className="text-gray-600">{d.desc}</span>
                                </div>
                            ))}
                        </div>
                        <div className="info-box mt-4">
                            <p className="text-blue-800 font-semibold">💡 {tr.jupyter_first}</p>
                        </div>
                    </section>

                    {/* Stop */}
                    <section id="stop">
                        <h2 className="section-header">{tr.stop_title}</h2>
                        <p className="text-gray-600 mb-3">{tr.stop_desc}</p>
                        <div className="code-block mb-4">
                            <pre className="code-text">{tr.stop_cmd}</pre>
                            <CopyBtn text={tr.stop_cmd} />
                        </div>
                        <div className="info-box">
                            <p className="text-blue-800 text-sm">{tr.stop_note}</p>
                        </div>
                        <p className="text-gray-600 text-sm mt-4 mb-2">{tr.stop_restart}</p>
                        <div className="code-block">
                            <pre className="code-text">docker compose up -d</pre>
                            <CopyBtn text="docker compose up -d" />
                        </div>
                    </section>

                    {/* Troubleshooting */}
                    <section id="trouble">
                        <h2 className="section-header">{tr.trouble_title}</h2>
                        <div className="space-y-4">
                            {tr.trouble_items.map((item, i) => (
                                <div key={i} className="border rounded-xl overflow-hidden">
                                    <div className="p-4" style={{background:'rgba(232,121,47,0.08)', borderLeft:'4px solid #E8792F'}}>
                                        <p className="font-semibold" style={{color:'#E8792F'}}>❌ {item.problem}</p>
                                    </div>
                                    <div className="p-4 bg-white">
                                        <p className="text-gray-600 text-sm"><span className="font-semibold text-green-600">✓ Lösung: </span>{item.solution}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Commands */}
                    <section id="cmds" className="mb-16">
                        <h2 className="section-header">{tr.cmds_title}</h2>
                        <div className="overflow-x-auto rounded-xl border border-gray-200">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Befehl / Command</th>
                                        <th>Beschreibung / Description</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {tr.cmds.map((c, i) => (
                                        <tr key={i}>
                                            <td><code className="font-mono text-sm" style={{color:'#0389CF'}}>{c.cmd}</code></td>
                                            <td className="text-gray-600 text-sm">{c.desc}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </section>

                </main>
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
