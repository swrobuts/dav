<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notebooks im Browser – DAV Lab</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --color-primary: #0389CF;
            --color-orange: #E8792F;
            --color-light-blue: #EBF5FF;
            --color-light-yellow: #FFFBEB;
        }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; margin: 0; }
        .text-primary { color: var(--color-primary); }
        .bg-primary { background-color: var(--color-primary); }
        .text-orange { color: var(--color-orange); }
        .code-block {
            background-color: #1e293b;
            border-left: 4px solid var(--color-orange);
            padding: 1rem; border-radius: 0.5rem; position: relative;
        }
        .code-text {
            color: #e2e8f0; font-family: 'Courier New', monospace;
            font-size: 0.875rem; margin: 0; white-space: pre-wrap; word-break: break-all;
        }
        .copy-button {
            position: absolute; top: 0.5rem; right: 0.5rem;
            background-color: var(--color-orange); color: white;
            padding: 0.25rem 0.75rem; border: none; border-radius: 0.25rem;
            cursor: pointer; font-size: 0.75rem; transition: opacity 0.2s;
        }
        .copy-button:hover { opacity: 0.8; }
        .step-number {
            background-color: var(--color-orange); color: white;
            width: 2rem; height: 2rem; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; flex-shrink: 0;
        }
        .section-header {
            color: var(--color-primary); font-size: 1.875rem; font-weight: bold;
            border-left: 4px solid var(--color-orange);
            padding-left: 1rem; margin: 2rem 0 1.5rem 0;
        }
        .nav-sidebar {
            position: fixed; left: 0; top: 4rem;
            width: 240px; height: calc(100vh - 4rem);
            background-color: #f8f9fa; border-right: 1px solid #e0e0e0;
            overflow-y: auto; z-index: 40;
        }
        .nav-item {
            padding: 0.75rem 1.5rem; cursor: pointer;
            border-left: 3px solid transparent;
            color: #374151; transition: all 0.2s;
            font-size: 0.875rem; font-weight: 500;
        }
        .nav-item:hover { background-color: #e1eaf5; border-left-color: rgba(3,137,207,0.3); }
        .nav-item.active {
            background-color: rgba(3,137,207,0.07);
            border-left-color: var(--color-primary);
            color: var(--color-primary);
            font-weight: 600;
        }
        .main-content { margin-left: 240px; padding: 2rem; }
        .sticky-navbar {
            position: sticky; top: 0; height: 4rem; background-color: white;
            box-shadow: 0 1px 12px rgba(0,0,0,0.06);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 2rem; z-index: 50;
        }
        .lang-btn {
            padding: 0.4rem 0.7rem; border-radius: 0.375rem;
            border: 2px solid #e5e7eb; background: white;
            cursor: pointer; font-weight: 700; font-size: 0.8rem;
            color: #666; transition: all 0.2s;
        }
        .lang-btn.active { background: #E8792F; color: white; border-color: #E8792F; }
        .lang-btn:hover:not(.active) { border-color: #0389CF; color: #0389CF; }
        .info-box { background-color: var(--color-light-blue); border-left: 4px solid #3b82f6; padding: 1rem; border-radius: 0.5rem; margin: 1.5rem 0; }
        .warning-box { background-color: var(--color-light-yellow); border-left: 4px solid #fbbf24; padding: 1rem; border-radius: 0.5rem; margin: 1.5rem 0; }
        .success-box { background-color: #f0fdf4; border-left: 4px solid #22c55e; padding: 1rem; border-radius: 0.5rem; margin: 1.5rem 0; }
        table { width: 100%; border-collapse: collapse; background-color: white; }
        th { background-color: var(--color-primary); color: white; padding: 1rem; text-align: left; }
        td { padding: 0.875rem 1rem; border-bottom: 1px solid #e0e0e0; }
        tr:hover td { background-color: #f8fafc; }
        .colab-badge-btn {
            display: inline-flex; align-items: center;
            border: 2px solid #E8792F; border-radius: 6px;
            overflow: hidden; text-decoration: none;
            transition: background 0.2s, transform 0.1s;
        }
        .colab-badge-btn:hover { background: #E8792F; transform: translateY(-1px); }
        .colab-badge-btn img { display: block; height: 22px; }
        .notebook-card {
            background: white; border-radius: 10px;
            border: 1px solid rgba(3,137,207,0.15);
            padding: 0.9rem 1rem;
            display: flex; align-items: center; justify-content: space-between;
            gap: 0.75rem; transition: box-shadow 0.2s;
        }
        .notebook-card:hover { box-shadow: 0 2px 12px rgba(3,137,207,0.12); }
        .group-grundlagen { background: rgba(3,137,207,0.04); border-radius: 14px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .group-fallstudien { background: rgba(232,121,47,0.05); border-radius: 14px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .group-label {
            font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; margin-bottom: 0.75rem; padding-bottom: 0.5rem;
            border-bottom: 2px solid;
        }
        .group-label-blue { color: #0389CF; border-color: rgba(3,137,207,0.25); }
        .group-label-orange { color: #E8792F; border-color: rgba(232,121,47,0.25); }
        @media (max-width: 768px) { .nav-sidebar { display: none; } .main-content { margin-left: 0; } }
    </style>
</head>

            tips_title: 'Hinweise zur Nutzung',

                { icon: '\u21ba', title: 'Kernel zur\u00fccksetzen', desc: 'Bei unerwartetem Verhalten: Laufzeit \u2192 Laufzeit neu starten und alle ausf\u00fchren. Dadurch wird der Kernel-Zustand vollst\u00e4ndig zur\u00fcckgesetzt.' },

        en: {
            title: 'Running Notebooks in the Browser',

            brand: '\u2190 DAV Lab',

            overview_title: 'Overview: Google Colab',
            overview_desc: 'Google Colab is a cloud-based Jupyter environment. Python, pandas and plotly run in the browser on external servers \u2014 no local Python installation is required. A Google account is needed to use the service.',

                { icon: '\u25a0', label: 'No local setup', desc: 'No local Python installation or package management. Execution happens on the provider\u2019s servers.' },
                { icon: '\u25b6', label: 'Platform-independent', desc: 'Accessible via any modern browser \u2014 operating system independent.' },

            step1_title: 'Step 1: Open Notebook',

    const sections = ['overview', 'why', 'step1', 'step2', 'step3', 'notebooks', 'tips'];

    function ColabBadge({ file, label }) {
        const url = COLAB_BASE + file;
        return (
            <div className="notebook-card">
                <span className="text-sm font-semibold text-gray-700">{label}</span>
                <a href={url} target="_blank" rel="noopener noreferrer" className="colab-badge-btn" title={'Open ' + label + ' in Colab'}>
                    <img src={BADGE_SRC} alt="Open in Colab" />
                </a>
            </div>
        );
    }

    function App() {
        const [lang, setLang] = useState('de');
        const [active, setActive] = useState('overview');
        const tr = t[lang];

        const scrollTo = (id) => {
            setActive(id);
            document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
        };

        useEffect(() => {
            const handler = () => {
                for (const s of sections) {
                    const el = document.getElementById(s);
                    if (el) {
                        const rect = el.getBoundingClientRect();
                        if (rect.top <= 120 && rect.bottom >= 120) { setActive(s); break; }
                    }
                }
            };
            window.addEventListener('scroll', handler);
            return () => window.removeEventListener('scroll', handler);
        }, []);

        return (
            <div>

                <div className="sticky-navbar">
                    <div className="flex items-center gap-4">

                    <div className="py-4">
                        {sections.map((s, i) => (
                            <div key={s} className={`nav-item ${active===s?'active':''}`} onClick={() => scrollTo(s)}>
                                {tr.nav[i]}
                            </div>
                        ))}
                    </div>
                </nav>

                {/* Main Content */}
                <main className="main-content max-w-4xl">

                    {/* Hero */}

                                <rect x="8" y="12" width="14" height="2.5" rx="1.25" fill="white" opacity="0.7"/>
                                <rect x="8" y="18" width="10" height="2.5" rx="1.25" fill="white" opacity="0.5"/>
                                <rect x="8" y="24" width="12" height="2.5" rx="1.25" fill="white" opacity="0.5"/>
                                <rect x="8" y="30" width="8" height="2.5" rx="1.25" fill="white" opacity="0.4"/>
                                <circle cx="33" cy="29" r="8" fill="#E8792F"/>
                                <polygon points="30.5,25.5 30.5,32.5 37,29" fill="white"/>
                            </svg>
                        </div>
                        <div>
                            <h1 className="text-3xl font-black mb-2">{tr.title}</h1>
                            <p className="text-lg opacity-80">{tr.subtitle}</p>
                        </div>
                    </div>

                    {/* Overview */}
                    <section id="overview">
                        <h2 className="section-header">{tr.overview_title}</h2>
                        <p className="text-gray-600 mb-6">{tr.overview_desc}</p>
                        <div className="grid md:grid-cols-3 gap-4 mb-4">
                            {tr.features.map((f, i) => (
                                <div key={i} className="rounded-xl p-5 border text-center" style={{borderColor:'rgba(3,137,207,0.2)', background:'rgba(3,137,207,0.03)'}}>
                                    <div className="text-2xl mb-2" style={{color:'#0389CF'}}>
                                        {i === 0 && (
                                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0389CF" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{margin:'0 auto'}}><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M9 12l2 2 4-4"/></svg>
                                        )}
                                        {i === 1 && (
                                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0389CF" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{margin:'0 auto'}}><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                                        )}
                                        {i === 2 && (
                                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0389CF" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{margin:'0 auto'}}><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                                        )}
                                    </div>
                                    <h3 className="font-bold mb-1" style={{color:'#0389CF'}}>{f.label}</h3>
                                    <p className="text-gray-600 text-sm">{f.desc}</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Why Colab */}
                    <section id="why">
                        <h2 className="section-header">{tr.why_title}</h2>
                        <p className="text-gray-600 mb-6">{tr.why_desc}</p>
                        <div style={{overflowX:'auto'}}>
                            <table style={{width:'100%', borderCollapse:'collapse', fontSize:'0.875rem'}}>
                                <thead>
                                    <tr style={{background:'#f1f5f9', borderBottom:'2px solid #e2e8f0'}}>
                                        <th style={{padding:'0.7rem 1rem', textAlign:'left', fontWeight:700, color:'#374151'}}>{tr.alt_col_name}</th>
                                        <th style={{padding:'0.7rem 1rem', textAlign:'left', fontWeight:700, color:'#374151'}}>{tr.alt_col_type}</th>
                                        <th style={{padding:'0.7rem 1rem', textAlign:'left', fontWeight:700, color:'#374151'}}>{tr.alt_col_cost}</th>
                                        <th style={{padding:'0.7rem 1rem', textAlign:'left', fontWeight:700, color:'#374151'}}>{tr.alt_col_req}</th>
                                        <th style={{padding:'0.7rem 1rem', textAlign:'left', fontWeight:700, color:'#374151'}}>{tr.alt_col_note}</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {tr.alternatives.map((a, i) => (
                                        <tr key={i} style={{borderBottom:'1px solid #e2e8f0', background: i % 2 === 0 ? 'white' : '#fafafa'}}>
                                            <td style={{padding:'0.65rem 1rem', fontWeight:600, color:'#1e293b'}}>{a.name}</td>
                                            <td style={{padding:'0.65rem 1rem', color:'#64748b'}}>{a.type}</td>
                                            <td style={{padding:'0.65rem 1rem', color:'#64748b'}}>{a.cost}</td>
                                            <td style={{padding:'0.65rem 1rem', color:'#64748b'}}>{a.req}</td>
                                            <td style={{padding:'0.65rem 1rem', color:'#64748b', fontSize:'0.825rem'}}>{a.note}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                        <p style={{color:'#94a3b8', fontSize:'0.8rem', marginTop:'0.75rem'}}>
                            {lang === 'de'
                                ? 'Diese Seite beschreibt die Nutzung mit Google Colab, da die Notebooks über Colab-Badges verlinkt sind. Andere Umgebungen sind grundsätzlich ebenfalls geeignet.'
                                : 'This page describes usage with Google Colab, as the notebooks are linked via Colab badges. Other environments are generally suitable as well.'}
                        </p>
                    </section>

                    {/* Step 1: Open */}
                    <section id="step1">
                        <h2 className="section-header">{tr.step1_title}</h2>

                        {/* Option A */}
                        <div className="mb-6">
                            <div className="flex items-center gap-3 mb-3">
                                <div className="step-number">A</div>
                                <p className="font-semibold text-gray-800">{tr.step1_option_a}</p>
                            </div>
                            <div className="info-box ml-10">
                                <p className="text-sm" style={{color:'#374151'}}>{tr.step1_option_a_desc}</p>
                                <div className="mt-3">
                                    <a href={COLAB_BASE + '00_Willkommen.ipynb'} target="_blank" rel="noopener noreferrer" className="colab-badge-btn">
                                        <img src={BADGE_SRC} alt="Open in Colab" />
                                    </a>
                                    <span className="text-xs text-gray-500 ml-3">Beispiel: 00 Willkommen</span>
                                </div>
                            </div>
                        </div>

                        {/* Option B */}
                        <div>
                            <div className="flex items-center gap-3 mb-3">
                                <div className="step-number">B</div>
                                <p className="font-semibold text-gray-800">{tr.step1_option_b}</p>
                            </div>
                            <div className="ml-10">
                                <ol className="space-y-2">
                                    {tr.step1_option_b_steps.map((step, i) => (
                                        <li key={i} className="flex items-start gap-3 text-sm text-gray-600">
                                            <span className="flex-shrink-0 w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold text-white mt-0.5" style={{background:'rgba(3,137,207,0.5)'}}>{i+1}</span>
                                            {step}
                                        </li>
                                    ))}
                                </ol>
                            </div>
                        </div>
                    </section>

                    {/* Step 2: Run */}
                    <section id="step2">
                        <h2 className="section-header">{tr.step2_title}</h2>

                        <div className="grid md:grid-cols-2 gap-4 mb-4">
                            <div className="rounded-xl p-5 border" style={{borderColor:'rgba(3,137,207,0.2)', background:'rgba(3,137,207,0.03)'}}>
                                <p className="font-bold text-gray-800 mb-1">{tr.step2_run_all}</p>
                                <p className="text-gray-600 text-sm">{tr.step2_run_all_desc}</p>
                                <div className="code-block mt-3">
                                    <pre className="code-text">{'Runtime \u2192 Run all\n(Ctrl+F9)'}</pre>
                                </div>
                            </div>
                            <div className="rounded-xl p-5 border" style={{borderColor:'rgba(3,137,207,0.2)', background:'rgba(3,137,207,0.03)'}}>
                                <p className="font-bold text-gray-800 mb-1">{tr.step2_run_one}</p>
                                <p className="text-gray-600 text-sm">{tr.step2_run_one_desc}</p>
                                <div className="mt-3 flex items-center gap-2">
                                    <span className="inline-flex items-center justify-center w-8 h-8 rounded-full text-white font-bold text-sm" style={{background:'#0389CF'}}>&#9654;</span>
                                    <span className="text-sm text-gray-500">{lang === 'de' ? 'Schaltfl\u00e4che neben der Zelle' : 'Button next to the cell'}</span>
                                </div>
                            </div>
                        </div>

                        <div className="warning-box">
                            <p className="font-bold text-yellow-800 text-sm mb-1">&#9888; {tr.step2_note_title}</p>
                            <p className="text-yellow-700 text-sm">{tr.step2_note_desc}</p>
                        </div>
                    </section>

                    {/* Step 3: Save */}
                    <section id="step3">
                        <h2 className="section-header">{tr.step3_title}</h2>

                        <div className="grid md:grid-cols-2 gap-4 mb-4">
                            <div className="rounded-xl p-5 border-2" style={{borderColor:'rgba(34,197,94,0.4)', background:'#f0fdf4'}}>
                                <div className="flex items-center gap-2 mb-2">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#16a34a" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                                    <p className="font-bold text-green-800">{tr.step3_gdrive}</p>
                                </div>
                                <p className="text-green-700 text-sm">{tr.step3_gdrive_desc}</p>
                            </div>
                            <div className="rounded-xl p-5 border" style={{borderColor:'rgba(3,137,207,0.2)', background:'rgba(3,137,207,0.03)'}}>
                                <div className="flex items-center gap-2 mb-2">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0389CF" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                    <p className="font-bold" style={{color:'#0389CF'}}>{tr.step3_download}</p>
                                </div>
                                <p className="text-gray-600 text-sm">{tr.step3_download_desc}</p>
                            </div>
                        </div>

                        <div className="warning-box">
                            <p className="font-bold text-yellow-800 text-sm mb-1">&#9888; {lang === 'de' ? 'Hinweis' : 'Note'}</p>
                            <p className="text-yellow-700 text-sm">{tr.step3_warning}</p>
                        </div>
                    </section>

                    {/* All Notebooks */}
                    <section id="notebooks">
                        <h2 className="section-header">{tr.notebooks_title}</h2>
                        <p className="text-gray-600 mb-6">{tr.notebooks_desc}</p>

                        {/* Grundlagen */}
                        <div className="group-grundlagen">
                            <div className="group-label group-label-blue">{tr.group_grundlagen}</div>
                            <div className="space-y-2">
                                {notebooks.grundlagen.map((nb) => (
                                    <ColabBadge key={nb.file} file={nb.file} label={nb.label} />
                                ))}
                            </div>
                        </div>

                        {/* Fallstudien */}
                        <div className="group-fallstudien">
                            <div className="group-label group-label-orange">{tr.group_fallstudien}</div>
                            <div className="space-y-2">
                                {notebooks.fallstudien.map((nb) => (
                                    <ColabBadge key={nb.file} file={nb.file} label={nb.label} />
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Tips & Tricks */}
                    <section id="tips" className="mb-16">
                        <h2 className="section-header">{tr.tips_title}</h2>
                        <div className="space-y-4">
                            {tr.tips.map((tip, i) => (
                                <div key={i} className="border rounded-xl overflow-hidden" style={{borderColor:'rgba(3,137,207,0.15)'}}>
                                    <div className="p-4 flex items-start gap-3" style={{background: i === 2 ? 'rgba(251,191,36,0.08)' : 'rgba(3,137,207,0.05)', borderLeft: `4px solid ${i === 2 ? '#fbbf24' : '#0389CF'}`}}>
                                        <div className="flex-1">
                                            <p className="font-bold mb-1" style={{color: i === 2 ? '#92400e' : '#0389CF'}}>{tip.title}</p>
                                            <p className="text-sm" style={{color: i === 2 ? '#78350f' : '#374151'}}>{tip.desc}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* CTA */}
                    <section className="mb-16">
                        <div style={{background:'#0389CF', borderRadius:12, padding:'2rem', textAlign:'center'}}>
                            <p style={{color:'white', fontWeight:800, fontSize:'1.1rem', marginBottom:'0.5rem'}}>
                                {lang === 'de' ? 'Bereit? Jetzt loslegen:' : 'Ready? Start now:'}
                            </p>
                            <p style={{color:'rgba(255,255,255,0.75)', fontSize:'0.9rem', marginBottom:'1.25rem'}}>
                                {lang === 'de' ? 'Starten Sie mit dem Willkommen-Notebook.' : 'Start with the welcome notebook.'}
                            </p>
                            <a href={COLAB_BASE + '00_Willkommen.ipynb'}
                               target="_blank" rel="noopener noreferrer"
                               style={{display:'inline-flex', alignItems:'center', gap:'0.6rem', background:'#E8792F', color:'white', fontWeight:700, padding:'0.9rem 2rem', borderRadius:10, fontSize:'1rem', textDecoration:'none'}}>
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
                                {lang === 'de' ? '00 Willkommen in Colab \u00f6ffnen' : 'Open 00 Welcome in Colab'}
                            </a>
                        </div>
                    </section>

                </main>

                {/* Footer */}
                <footer style={{background:'#0f172a', padding:'2.5rem 1.5rem', textAlign:'center', marginLeft:240}}>
                    <p style={{fontWeight:700, color:'#e2e8f0', marginBottom:'0.3rem', fontSize:'0.9rem'}}>{'Gebaut mit \u2665 f\u00fcr BBA Studierende \u00b7 THWS W\u00fcrzburg-Schweinfurt'}</p>
                    <p style={{color:'#64748b', fontSize:'0.82rem', marginBottom:'0.25rem'}}>Prof. Dr. Robert Butscher</p>
                    <div style={{marginTop:'1rem'}}>
                        <a href="index.html" style={{color:'#60a5fa', fontSize:'0.82rem', textDecoration:'none'}}>{'\u2190 DAV Lab'}</a>
                    </div>
                </footer>
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
