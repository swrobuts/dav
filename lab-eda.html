        first_look_code: `import pandas as pd

        dist_code: `import pandas as pd
import matplotlib.pyplot as plt

# --- Numerische Spalten ---

        outlier_title: 'Ausreißer erkennen',
        outlier_code: `import pandas as pd
import numpy as np
import matplotlib.pyplot as plt

df = pd.read_csv('../data/flights.csv')
delays = df['dep_delay'].dropna()

# --- Methode 1: Z-Score ---
from scipy import stats
z_scores = np.abs(stats.zscore(delays))
outliers_z = delays[z_scores > 3]
print(f"Z-Score Ausreißer (|z|>3): {len(outliers_z)} ({len(outliers_z)/len(delays)*100:.1f}%)")

# --- Methode 2: IQR (Interquartile Range) ---
Q1 = delays.quantile(0.25)
Q3 = delays.quantile(0.75)
IQR = Q3 - Q1
lower_bound = Q1 - 1.5 * IQR
upper_bound = Q3 + 1.5 * IQR

outliers_iqr = delays[(delays < lower_bound) | (delays > upper_bound)]
print(f"IQR Ausreißer: {len(outliers_iqr)} ({len(outliers_iqr)/len(delays)*100:.1f}%)")
print(f"Grenzen: [{lower_bound:.1f}, {upper_bound:.1f}]")

# Visualisierung
fig, (ax1, ax2) = plt.subplots(1, 2, figsize=(12, 4))
delays.plot.hist(bins=100, ax=ax1, color='#0389CF', alpha=0.7)
ax1.axvline(lower_bound, color='red', linestyle='--', label='IQR Grenzen')
ax1.axvline(upper_bound, color='red', linestyle='--')
ax1.legend()
ax1.set_title('Departure Delay – Histogramm mit IQR-Grenzen')

delays.plot.box(ax=ax2, vert=True)
ax2.set_title('Boxplot mit Ausreißern')
plt.tight_layout()
plt.show()`,
        corr_title: 'Korrelationsanalyse',
        corr_code: `import pandas as pd
import seaborn as sns
import matplotlib.pyplot as plt

df = pd.read_csv('../data/flights.csv')

# Nur numerische Spalten
numeric_cols = df.select_dtypes(include='number')

# Korrelationsmatrix berechnen
corr_matrix = numeric_cols.corr()
print(corr_matrix)

# Heatmap visualisieren
plt.figure(figsize=(10, 8))
sns.heatmap(corr_matrix,
    annot=True,          # Werte anzeigen
    fmt='.2f',           # 2 Dezimalstellen
    cmap='coolwarm',     # Farbskala
    center=0,            # 0 ist neutral (weiß)
    square=True,         # Quadratische Zellen
    linewidths=0.5)
plt.title('Korrelationsmatrix – Flugverspätungen')
plt.tight_layout()
plt.show()

# Stärkste Korrelationen ausgeben
corr_pairs = corr_matrix.unstack()
corr_pairs = corr_pairs[corr_pairs < 1.0]  # Selbst-Korrelation entfernen
top_corr = corr_pairs.abs().sort_values(ascending=False).head(10)
print("\\nStärkste Korrelationen:")
print(top_corr)`,
        quiz_title: 'Quiz: Daten inspizieren & EDA',
        quiz_intro: 'Testen Sie Ihr Wissen – 5 Fragen.',
        quiz: [
            { q: 'Was beschreibt die "Explorative Datenanalyse (EDA)" im Kontext der Datenaufbereitung?', opts: ['Die Entwicklung prädiktiver Modelle basierend auf den Daten', 'Das Durchführen von statistischen Tests zur Hypothesenprüfung', 'Das visuelle und statistische Erkunden der Daten, um Muster zu identifizieren und Hypothesen zu generieren', 'Die Erstellung endgültiger Reports für Stakeholder'], ans: 2 },
            { q: 'In welcher Phase des CRISP-DM Modells wird die Datenvisualisierung hauptsächlich durchgeführt?', opts: ['Data Preparation', 'Data Understanding', 'Modeling', 'Evaluation'], ans: 1 },
            { q: 'Welche Methode gehört nicht zum Bereich der explorativen Datenanalyse (EDA)?', opts: ['Box-Plot-Diagramme', 'Hauptkomponentenanalyse (PCA)', 'Data Enrichment', 'Berechnung des Interquartilsabstands'], ans: 2 },
            { q: 'Welches Konzept wird NICHT für die Bewertung der Datenqualität verwendet?', opts: ['Vollständigkeit', 'Aktualität', 'Visualität', 'Konsistenz'], ans: 2 },
            { q: 'Was ist der Hauptunterschied zwischen "Data Profiling" und "Data Mining"?', opts: ['Data Profiling fokussiert auf die Bewertung der Datenqualität, während Data Mining Muster und Beziehungen in den Daten sucht', 'Data Profiling ist eine Form der Datenvisualisierung, Data Mining ist eine Form der Datenbereinigung', 'Es gibt keinen Unterschied; beide Begriffe können synonym verwendet werden', 'Data Profiling verwendet maschinelles Lernen, Data Mining basiert auf statistischen Methoden'], ans: 0 }
        ],
        nb_title: 'Notebook öffnen', nb_desc: 'Für praktische Übungen:'
    }
};
content.en = {
    ...content.de,
    back: '← DAV Lab', title: 'Data Inspection & EDA',
    sections: ['Overview','First Look','Missing Values','Distributions','Outliers','Correlations','Quiz','Notebook'],
    overview_title: 'Exploratory Data Analysis (EDA)',
    scenario: 'Scenario: You received a new dataset – what do you do first? Before cleaning or modeling anything, you need to get to know the data. EDA is the systematic exploration of a dataset.',

    missing_title: 'Analyzing Missing Values',
    dist_title: 'Distribution Analysis',
    outlier_title: 'Detecting Outliers',
    corr_title: 'Correlation Analysis',
    quiz_title: 'Quiz: Data Inspection & EDA',
    quiz_intro: 'Test your knowledge – 5 questions.',
    nb_title: 'Open Notebook', nb_desc: 'For hands-on exercises:'
};

function QuizSection({ questions, title, intro }) {
    const [answers, setAnswers] = useState({});
    const [checked, setChecked] = useState({});
    const [score, setScore] = useState(null);
    const check = (qi, oi) => { if (checked[qi]) return; setAnswers(a => ({...a,[qi]:oi})); setChecked(c => ({...c,[qi]:true})); };
    const calcScore = () => { let s=0; questions.forEach((q,i) => { if(answers[i]===q.ans) s++; }); setScore(s); };
    return (
        <div><h2>{title}</h2><p>{intro}</p>
        {questions.map((q,qi) => (
            <div key={qi} className="mb-6 p-4 bg-white rounded-xl border border-gray-200">
                <p className="font-semibold text-gray-800 mb-3">{qi+1}. {q.q}</p>
                {q.opts.map((opt,oi) => <button key={oi} className={`quiz-option ${checked[qi]?(oi===q.ans?'correct':(answers[qi]===oi?'wrong':'')):''}` } onClick={() => check(qi,oi)}>{opt}</button>)}
            </div>
        ))}
        <button onClick={calcScore} className="mt-4 px-6 py-3 rounded-xl text-white font-bold" style={{background:'#0389CF'}}>Auswertung / Results</button>
        {score !== null && (
            <div className="mt-4 p-4 rounded-xl text-center" style={{background:score>=questions.length*0.8?'#f0fdf4':'#fef2f2'}}>
                <p className="text-2xl font-black">{score}/{questions.length}</p>
                <p className="font-semibold">{score >= questions.length*0.8 ? 'Sehr gut!' : 'Nochmal lesen!'}</p>
            </div>
        )}
        </div>
    );
}

                </div>
            </div>
            <nav className="sidebar">
                {sectionIds.map((id,i) => <div key={id} className={`sidebar-item ${active===id?'active':''}`} onClick={() => scrollTo(id)}>{tr.sections[i]}</div>)}
            </nav>
            <main className="main-content">

                    <div className="tip-box">

                    </div>
                    <div className="concept-box">
                        <p className="font-semibold mb-1" style={{color:'#0389CF'}}>Was ist EDA?</p>
                        <p className="text-sm text-gray-600">{tr.eda_def}</p>
                    </div>
                    <div className="grid grid-cols-2 md:grid-cols-3 gap-3 mt-4">
                        {['df.head() / df.tail()','df.info()','df.describe()','df.isnull().sum()','value_counts()','corr() / heatmap'].map((m,i) => (
                            <div key={i} className="bg-white rounded-xl p-3 border border-gray-200 font-mono text-sm" style={{color:'#E8792F'}}>{m}</div>
                        ))}
                    </div>
                </div>
                <div id="first_look" className="mb-12"><h2>{tr.first_look_title}</h2><div className="code-block">{tr.first_look_code}</div></div>

                    </div>
                </div>
                <div id="distributions" className="mb-12">

                            <li><b>Histogramm</b>: Verteilung einer numerischen Variable</li>
                            <li><b>Boxplot</b>: Median, Quartile, Ausreißer auf einen Blick</li>
                            <li><b>Violinplot</b>: Wie Boxplot + Dichteverteilung</li>
                            <li><b>Balkendiagramm</b>: Häufigkeiten kategorischer Variablen</li>
                        </ul>
                    </div>
                </div>
                <div id="outliers" className="mb-12">
                    <h2>{tr.outlier_title}</h2>
                    <div className="code-block">{tr.outlier_code}</div>
                    <div className="info-box">
                        <p className="text-blue-800 text-sm"><b>Z-Score</b>: Gut bei normalverteilten Daten. <b>IQR</b>: Robuster, funktioniert auch bei schiefen Verteilungen. IQR = Q3 - Q1. Ausreißer: {'<'} Q1 - 1.5×IQR oder {'>'} Q3 + 1.5×IQR.</p>
                    </div>
                </div>
                <div id="correlations" className="mb-12">
                    <h2>{tr.corr_title}</h2>
                    <div className="code-block">{tr.corr_code}</div>
                    <div className="tip-box">
                        <p className="text-yellow-800 text-sm"><b>Korrelation ≠ Kausalität!</b> Zwei Variablen können stark korrelieren, ohne dass eine die andere verursacht.</p>
                    </div>
                </div>
                <div id="quiz" className="mb-12"><QuizSection questions={tr.quiz} title={tr.quiz_title} intro={tr.quiz_intro} /></div>
                <div id="notebook" className="mb-12">

                    <a href="http://localhost:8888/lab/tree/notebooks/04_Daten_Inspizieren.ipynb" target="_blank" rel="noopener noreferrer"
                       className="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-white font-semibold mt-3" style={{background:'#E8792F'}}>
                        04_Daten_Inspizieren.ipynb →
                    </a>
                    <div className="info-box mt-4"><p className="text-blue-800 text-sm">Datensatz: flights.csv aus dem DAV-Kurs.</p></div>
                    <div style={{marginTop:'2rem', background:'#0389CF', borderRadius:12, padding:'2rem', textAlign:'center'}}>
                        <p style={{color:'white', fontWeight:800, fontSize:'1.1rem', marginBottom:'1rem'}}>
                            {lang==='de' ? 'Notebook in Docker öffnen:' : 'Open Notebook in Docker:'}
                        </p>
                        <a href="http://localhost:8888/lab/tree/notebooks/04_Daten_Inspizieren.ipynb"
                           target="_blank" rel="noopener noreferrer"
                           style={{display:'inline-flex', alignItems:'center', gap:'0.5rem', background:'#E8792F', color:'white', fontWeight:700, padding:'0.9rem 2rem', borderRadius:10, fontSize:'1rem', textDecoration:'none'}}>
                            Notebook in Docker öffnen →
                        </a>
                    </div>
                </div>
            </main>

            {/* Footer */}
            <footer style={{background:'#0f172a', padding:'2.5rem 1.5rem', textAlign:'center', marginLeft:260}}>

                <div style={{marginTop:'1rem'}}>

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
