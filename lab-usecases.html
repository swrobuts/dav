<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const sectionIds = ['overview','churn','movies','cars','workflow','quiz','notebooks'];

function QuizSection({ questions, title, intro }) {
    const [answers, setAnswers] = useState({});
    const [checked, setChecked] = useState({});
    const [score, setScore] = useState(null);
    const check = (qi, oi) => { if (checked[qi]) return; setAnswers(a => ({...a,[qi]:oi})); setChecked(c => ({...c,[qi]:true})); };
    const calcScore = () => { let s=0; questions.forEach((q,i) => { if(answers[i]===q.ans) s++; }); setScore(s); };
    return (
        <div><h2>{title}</h2><p>{intro}</p>
        {questions.map((q,qi) => (
            <div key={qi} className="mb-6 p-4 bg-white rounded-xl border border-gray-200">
                <p className="font-semibold text-gray-800 mb-3">{qi+1}. {q.q}</p>
                {q.opts.map((opt,oi) => <button key={oi} className={`quiz-option ${checked[qi]?(oi===q.ans?'correct':(answers[qi]===oi?'wrong':'')):''}` } onClick={() => check(qi,oi)}>{opt}</button>)}
            </div>
        ))}
        <button onClick={calcScore} className="mt-4 px-6 py-3 rounded-xl text-white font-bold" style={{background:'#0389CF'}}>Auswertung / Results</button>
        {score !== null && (
            <div className="mt-4 p-4 rounded-xl text-center" style={{background:score>=questions.length*0.8?'#f0fdf4':'#fef2f2'}}>
                <p className="text-2xl font-black">{score}/{questions.length}</p>
                <p className="font-semibold">{score>=questions.length*0.8?'Sehr gut!':'Nochmal lesen!'}</p>
            </div>
        )}
        </div>
    );
}

const quiz_questions = [
    { q: 'Was ist eine "Data Pipeline"?', opts: ['Eine physische Infrastruktur für den Transport von Datenmedien','Ein Prozessablauf, der Rohdaten sammelt, verarbeitet und für Analysezwecke bereitstellt','Eine spezielle Datenstruktur in der Programmierung','Ein Werkzeug zur Visualisierung von Datenflüssen'], ans: 1 },
    { q: 'Was beschreibt "Data Augmentation"?', opts: ['Die Erhöhung der Datenqualität durch Bereinigungsverfahren','Die Erweiterung vorhandener Datensätze durch synthetische Daten zur Verbesserung der Modellgenauigkeit','Die Reduktion der Datenmenge zur Beschleunigung des Analyseprozesses','Die Aggregation von Daten für summarische Berichte'], ans: 1 },
    { q: 'Was ist ein "Data Lake"?', opts: ['Eine spezielle Datenbank für die Speicherung relationaler Daten','Ein Tool zur Datenvisualisierung','Eine Speicherlösung, die eine große Menge an rohen, unstrukturierten Daten schemalos speichert','Ein Algorithmus zur Datenbereinigung'], ans: 2 },
    { q: 'Welche Aussage über "Sparse Data" ist korrekt?', opts: ['Es handelt sich um Daten mit einer hohen Dichte an Nullwerten oder Leerstellen.','Es sind Daten, die ausschließlich aus Textdaten bestehen.','Es sind Daten, die in sehr kurzen Zeitabständen gesammelt werden.','Es beschreibt Daten mit einer geringen Anzahl von Ausreißern.'], ans: 0 },
    { q: 'Was versteht man unter "Temporal Data"?', opts: ['Daten, die zeitabhängige Informationen enthalten','Temporär gespeicherte Daten, die regelmäßig gelöscht werden','Daten, die aus Temperaturmessungen bestehen','Daten, die in temporären Speicherstrukturen gehalten werden'], ans: 0 }

                    </div>
                    <div className="code-block">{`import pandas as pd
import numpy as np
import plotly.express as px
from sklearn.preprocessing import LabelEncoder, StandardScaler

# --- 1. Business Understanding ---
# Frage: Welche Faktoren beeinflussen Churn?

                    <div className="code-block">{`import pandas as pd
import plotly.express as px
import plotly.graph_objects as go

df = pd.read_csv('../data/movies.csv')

# --- Feature Engineering für Filme ---
# Dekade berechnen
df['decade'] = (df['year'] // 10) * 10

# Profit-Ratio
df['profit_ratio'] = df['revenue_mio'] / df['budget_mio'].replace(0, 1)
df['profit_mio'] = df['revenue_mio'] - df['budget_mio']

# Rating-Kategorie
df['rating_cat'] = pd.cut(df['rating'],
    bins=[0, 5, 7, 8, 10],
    labels=['Schlecht', 'Gut', 'Sehr gut', 'Ausgezeichnet'])

# --- Frage 1: Welches Genre ist profitabelst? ---
genre_profit = df.groupby('genre').agg({
    'profit_mio': 'mean',
    'rating': 'mean',
    'title': 'count'
}).rename(columns={'title': 'anzahl'}).sort_values('profit_mio', ascending=False)
print(genre_profit)

fig = px.bar(genre_profit.reset_index(),
    x='genre', y='profit_mio',
    title='Durchschnittlicher Profit nach Genre (Mio. $)',
    color='profit_mio', color_continuous_scale='Blues')
fig.show()

# --- Frage 2: Budget vs. Revenue Korrelation ---

                    <div className="code-block">{`import pandas as pd
import numpy as np
from sklearn.preprocessing import LabelEncoder, MinMaxScaler

# --- Daten laden (echte Kursdaten!) ---
df = pd.read_excel('../data/cars.xlsx')
print(df.head())
print(df.info())

# --- EDA ---
print("\\nNumerische Statistiken:")
print(df.describe())

print("\\nFehlende Werte:")
print(df.isnull().sum()[df.isnull().sum() > 0])

# --- Bereinigung ---
df_clean = df.copy()

# Fehlende Werte behandeln
for col in df_clean.select_dtypes('number').columns:
    df_clean[col] = df_clean[col].fillna(df_clean[col].median())

for col in df_clean.select_dtypes('object').columns:
    df_clean[col] = df_clean[col].fillna(df_clean[col].mode()[0])

# Ausreißer beim Preis entfernen
Q1, Q3 = df_clean['price'].quantile([0.01, 0.99])
df_clean = df_clean[(df_clean['price'] >= Q1) & (df_clean['price'] <= Q3)]

# --- Feature Engineering ---
df_clean['fahrzeugalter'] = 2026 - df_clean['year']
df_clean['preis_pro_km'] = df_clean['price'] / df_clean['mileage'].replace(0, 1)

# --- Encoding ---
le = LabelEncoder()
for col in df_clean.select_dtypes('object').columns:
    df_clean[col + '_encoded'] = le.fit_transform(df_clean[col].astype(str))

# --- Skalierung ---
scaler = MinMaxScaler()
num_features = ['mileage', 'fahrzeugalter', 'engine_size']
df_clean[num_features] = scaler.fit_transform(df_clean[num_features])

print(f"\\nML-bereit: {df_clean.shape}")
df_clean.to_csv('../data/used_cars_prepared.csv', index=False)`}</div>
