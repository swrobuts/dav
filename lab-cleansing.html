const code_missing = `import pandas as pd
import numpy as np

# Datensatz mit Problemen laden
df = pd.read_excel('../data/verkaufsdaten_mit_problemen.xlsx')

print("Fehlende Werte vor Bereinigung:")
print(df.isnull().sum())
print(f"Gesamtanteil: {df.isnull().sum().sum() / df.size * 100:.1f}%")

# --- Strategie 1: Zeilen/Spalten löschen ---
# Zeilen mit zu vielen fehlenden Werten entfernen
df_clean = df.dropna(thresh=len(df.columns) * 0.5)  # mind. 50% ausgefüllt

# --- Strategie 2: Einfache Imputation ---
# Numerisch: Mittelwert
df['preis'] = df['preis'].fillna(df['preis'].mean())

# Numerisch: Median (robuster bei Ausreißern)
df['menge'] = df['menge'].fillna(df['menge'].median())

# Kategorisch: Modus (häufigster Wert)
df['kategorie'] = df['kategorie'].fillna(df['kategorie'].mode()[0])

# --- Strategie 3: Forward/Backward Fill (Zeitreihen) ---
df['zeitreihe'] = df['zeitreihe'].fillna(method='ffill')  # vorheriger Wert
df['zeitreihe'] = df['zeitreihe'].fillna(method='bfill')  # nächster Wert

# --- Strategie 4: KNN-Imputation (sklearn) ---
from sklearn.impute import KNNImputer
imputer = KNNImputer(n_neighbors=5)
df[['preis','menge']] = imputer.fit_transform(df[['preis','menge']])

print("\\nFehlende Werte nach Bereinigung:")
print(df.isnull().sum())`;

const code_duplicates = `import pandas as pd

df = pd.read_excel('../data/verkaufsdaten_mit_problemen.xlsx')

# --- Duplikate identifizieren ---
print(f"Duplikate gesamt: {df.duplicated().sum()}")

# Welche Spalten für Duplikat-Check?
dupes = df[df.duplicated(subset=['kunden_id', 'datum', 'produkt'], keep=False)]
print(f"Duplikate (key columns): {len(dupes)}")
print(dupes.head())

# --- Duplikate entfernen ---
# Erste Instanz behalten
df_clean = df.drop_duplicates()

# Letzte Instanz behalten
df_clean = df.drop_duplicates(keep='last')

# Nur bestimmte Spalten prüfen
df_clean = df.drop_duplicates(subset=['kunden_id', 'datum'], keep='first')

print(f"\\nVorher: {len(df)} Zeilen → Nachher: {len(df_clean)} Zeilen")`;

const code_strings = `import pandas as pd

df = pd.read_excel('../data/verkaufsdaten_mit_problemen.xlsx')

# --- String-Bereinigung ---
# Leerzeichen entfernen
df['stadt'] = df['stadt'].str.strip()
df['name'] = df['name'].str.strip()

# Einheitliche Groß-/Kleinschreibung
df['kategorie'] = df['kategorie'].str.lower()
df['name'] = df['name'].str.title()  # Ersten Buchstaben groß

# Zeichen ersetzen
df['telefon'] = df['telefon'].str.replace(' ', '').str.replace('-', '')

# Regex: nur Ziffern behalten (z.B. PLZ)
df['plz'] = df['plz'].str.extract(r'(\\d{5})')

# Inkonsistente Werte normalisieren
mapping = {'yes': 'Ja', 'no': 'Nein', '1': 'Ja', '0': 'Nein', True: 'Ja', False: 'Nein'}
df['aktiv'] = df['aktiv'].map(mapping).fillna(df['aktiv'])

# Tippfehler korrigieren (fuzzy matching)
# pip install thefuzz
from thefuzz import process
correct_cities = ['München', 'Berlin', 'Hamburg', 'Frankfurt']
df['stadt'] = df['stadt'].apply(
    lambda x: process.extractOne(str(x), correct_cities)[0] if pd.notna(x) else x
)`;

const code_datatypes = `import pandas as pd
import numpy as np

df = pd.read_excel('../data/verkaufsdaten_mit_problemen.xlsx')
print("Datentypen vorher:", df.dtypes.to_dict())

# --- Datentypen korrigieren ---
# String zu Zahl
df['preis'] = pd.to_numeric(df['preis'], errors='coerce')  # Fehler → NaN
df['menge'] = df['menge'].astype(int)

# String zu Datum
df['datum'] = pd.to_datetime(df['datum'], format='%d.%m.%Y', errors='coerce')
df['datum_auto'] = pd.to_datetime(df['datum_str'], infer_datetime_format=True)

# Kategorische Spalten (Speicher sparen!)
df['kategorie'] = df['kategorie'].astype('category')
df['status'] = pd.Categorical(df['status'],
    categories=['offen', 'in_bearbeitung', 'abgeschlossen'],
    ordered=True)

# Boolean
df['aktiv'] = df['aktiv'].map({'Ja': True, 'Nein': False}).astype(bool)

print("\\nDatentypen nachher:", df.dtypes.to_dict())

# Speicherverbrauch vergleichen
print(f"\\nMemory: {df.memory_usage(deep=True).sum() / 1024:.0f} KB")`;

const code_quality = `import pandas as pd
import numpy as np

def data_quality_score(df):
    """Berechnet einen Datenqualitätsscore (0-100)."""
    scores = {}

    # 1. Vollständigkeit (Completeness)
    completeness = 1 - (df.isnull().sum().sum() / df.size)
    scores['Vollständigkeit'] = completeness * 100

    # 2. Eindeutigkeit (Uniqueness) – Anteil nicht-duplizierter Zeilen
    uniqueness = 1 - (df.duplicated().sum() / len(df))
    scores['Eindeutigkeit'] = uniqueness * 100

    # 3. Konsistenz – Anteil korrekt typisierter Werte (vereinfacht)
    scores['Konsistenz'] = 100  # Hier würde man domänenspezifische Checks einfügen

    overall = np.mean(list(scores.values()))
    return scores, overall

# Vor Bereinigung
df_raw = pd.read_excel('../data/verkaufsdaten_mit_problemen.xlsx')
scores_before, total_before = data_quality_score(df_raw)
print(f"Qualitätsscore VORHER: {total_before:.1f}/100")

# Nach Bereinigung
df_clean = df_raw.dropna(thresh=5).drop_duplicates()
scores_after, total_after = data_quality_score(df_clean)
print(f"Qualitätsscore NACHHER: {total_after:.1f}/100")
print(f"\\nVerbesserung: +{total_after - total_before:.1f} Punkte")`;

function QuizSection({ questions, title, intro }) {
    const [answers, setAnswers] = useState({});
    const [checked, setChecked] = useState({});
    const [score, setScore] = useState(null);
    const check = (qi, oi) => { if (checked[qi]) return; setAnswers(a => ({...a,[qi]:oi})); setChecked(c => ({...c,[qi]:true})); };
    const calcScore = () => { let s=0; questions.forEach((q,i) => { if(answers[i]===q.ans) s++; }); setScore(s); };
    return (
        <div><h2>{title}</h2><p>{intro}</p>
        {questions.map((q,qi) => (
            <div key={qi} className="mb-6 p-4 bg-white rounded-xl border border-gray-200">
                <p className="font-semibold text-gray-800 mb-3">{qi+1}. {q.q}</p>
                {q.opts.map((opt,oi) => <button key={oi} className={`quiz-option ${checked[qi]?(oi===q.ans?'correct':(answers[qi]===oi?'wrong':'')):''}` } onClick={() => check(qi,oi)}>{opt}</button>)}
            </div>
        ))}
        <button onClick={calcScore} className="mt-4 px-6 py-3 rounded-xl text-white font-bold" style={{background:'#0389CF'}}>Auswertung / Results</button>
        {score !== null && (
            <div className="mt-4 p-4 rounded-xl text-center" style={{background:score>=questions.length*0.8?'#f0fdf4':'#fef2f2'}}>
                <p className="text-2xl font-black">{score}/{questions.length}</p>
                <p className="font-semibold">{score>=questions.length*0.8?'Sehr gut!':'Nochmal lesen!'}</p>
            </div>
        )}
        </div>
    );
}

import numpy as np

df = pd.read_excel('../data/verkaufsdaten_mit_problemen.xlsx')

# --- Methode 1: Capping (Winsorisierung) ---
# Ausreißer auf Grenzwerte begrenzen (nicht löschen)
Q1 = df['preis'].quantile(0.01)
Q99 = df['preis'].quantile(0.99)
df['preis_capped'] = df['preis'].clip(lower=Q1, upper=Q99)

# --- Methode 2: Entfernen ---
Q1, Q3 = df['preis'].quantile([0.25, 0.75])
IQR = Q3 - Q1
df_clean = df[(df['preis'] >= Q1 - 1.5*IQR) & (df['preis'] <= Q3 + 1.5*IQR)]

# --- Methode 3: Konditionales Löschen ---

df_clean = df_clean[df_clean['menge'] >= 0]  # Menge nicht negativ
